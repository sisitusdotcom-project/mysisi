<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keranjang Saya - SISITUS</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/assets/favicon/favicon.ico">
    <link rel="manifest" href="/assets/favicon/site.webmanifest">
    
    <!-- Styles -->
    <link rel="stylesheet" href="/assets/css/main.css">
    <link rel="stylesheet" href="/assets/css/components/auth.css">
    <link rel="stylesheet" href="/dashboard/styles/cart.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
</head>
<body class="checkout-page-body">
    <!-- Header Navigation -->
    <header aria-label="Navigasi Utama">
        <div class="container nav-container">
            <a href="/" class="logo" aria-label="Kembali ke Beranda sisitus.com">
                <div class="logo-img">
                    <img src="/assets/img/logo/logo512x512.webp" alt="Logo sisitus.com" width="512" height="512">
                </div>
                <div class="logo-text">
                    <span>sisitus.com</span>
                    <p>Solusi Digital Web Profesional</p>
                </div>
            </a>
            <nav class="nav-desktop" aria-label="Navigasi Desktop"></nav>
            <button class="nav-mobile-btn" id="nav-mobile-btn" aria-label="Buka/Tutup Menu Mobile" aria-expanded="false">
                <span></span><span></span><span></span>
            </button>
            <nav class="nav-mobile" id="nav-mobile" aria-label="Navigasi Mobile" aria-hidden="true"></nav>
        </div>
    </header>

    <div id="cart-container" class="page-container" style="padding-top: 40px;"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="/assets/js/components/navigation.js"></script>
    <script type="module">
        import { AuthManager } from '/assets/js/modules/unified-auth.js';
        import { render } from '/dashboard/js/modules/cart.js';

        // Initialize cart page (standalone, not SPA)
        const currentUser = AuthManager.getCurrentUser();
        
        if (currentUser) {
            // Authenticated users should use the dashboard cart
            window.location.replace('/dashboard/#!/dashboard/keranjang');
        } else {
            // Call render function with null for guest checkout
            render(null);
        }
    </script>
</body>
</html>
