<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keranjang Saya - SISITUS</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/assets/favicon/favicon.ico">
    <link rel="manifest" href="/assets/favicon/site.webmanifest">
    
    <!-- Styles -->
    <link rel="stylesheet" href="/assets/css/main.css">
    <link rel="stylesheet" href="/assets/css/components/auth.css">
    <link rel="stylesheet" href="/dashboard/styles/cart.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
</head>
<body class="checkout-page-body">
    <!-- Header Navigation -->
    <header class="checkout-header">
        <div class="checkout-header-container">
            <a href="/" class="checkout-brand">
                <img src="/assets/img/logo/logo.svg" alt="SISITUS Logo" class="checkout-logo-img">
                <span class="checkout-logo-text">SISITUS</span>
            </a>
            <a href="/" class="btn-back-home">
                <i class="fas fa-arrow-left"></i> Kembali ke Beranda
            </a>
        </div>
    </header>

    <div id="cart-container" class="page-container" style="padding-top: 40px;"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module">
        import { AuthManager } from '/assets/js/modules/unified-auth.js';
        import { render } from '/dashboard/js/modules/cart.js';

        // Initialize cart page (standalone, not SPA)
        const currentUser = AuthManager.getCurrentUser();
        
        // Call render function with currentUser
        render(currentUser);
    </script>
</body>
</html>
