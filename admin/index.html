<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISITUS - Admin Control Panel</title>

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/assets/favicon/favicon.ico">

    <!-- Fonts & Icons -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Styles -->
    <link rel="stylesheet" href="/assets/css/main.css"> <!-- Base styles -->
    <link rel="stylesheet" href="/admin/styles/admin-main.css"> <!-- Admin specific styles -->
</head>

<body class="admin-body dark-theme">

    <!-- Main Admin Layout -->
    <div id="admin-app" class="admin-layout">

        <!-- Sidebar Navigation -->
        <div id="admin-sidebar" class="admin-sidebar glass-panel"></div>

        <!-- Main Content Area -->
        <div class="admin-wrapper">

            <!-- Top Navigation -->
            <div id="admin-navbar" class="admin-navbar glass-panel"></div>

            <!-- Dynamic Content Router Target -->
            <div id="admin-content" class="admin-main-content">
                <div class="admin-loading-state">
                    <div class="admin-spinner"></div>
                    <p>Memuat Sistem...</p>
                </div>
            </div>

        </div>
    </div>

    <!-- Global Loading Overlay -->
    <div id="admin-loading-overlay" class="admin-overlay" style="display: none;">
        <div class="admin-spinner-large"></div>
    </div>

    <!-- SweetAlert2 for Notifications -->
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.js"></script>

    <!-- Chart.js for Admin Analytics -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Admin Application Scripts -->
    <script type="module" src="/admin/js/admin-app.js"></script>
</body>

</html>
