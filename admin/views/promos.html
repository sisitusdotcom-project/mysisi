<div class="admin-page-header">
    <div>
        <h1 class="admin-page-title">Kode Promo</h1>
        <p class="admin-page-desc">Kelola diskon dan promosi marketing untuk pelanggan.</p>
    </div>
    <div>
        <button class="admin-btn" id="btn-add-promo">
            <i class="fas fa-plus"></i> Buat Promo Baru
        </button>
    </div>
</div>

<div class="admin-card">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
        <div style="position: relative; width: 300px;">
            <i class="fas fa-search" style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--admin-text-muted);"></i>
            <input type="text" id="search-promos" placeholder="Cari kode promo..." 
                style="width: 100%; padding: 12px 16px 12px 48px; border-radius: 8px; border: 1px solid var(--admin-border); background: rgba(0,0,0,0.2); color: var(--admin-text-main); font-family: var(--font-admin-body);">
        </div>
        
        <div style="display: flex; gap: 12px;">
            <select style="padding: 12px 16px; border-radius: 8px; border: 1px solid var(--admin-border); background: var(--admin-surface); color: var(--admin-text-main); font-family: var(--font-admin-body);">
                <option value="all">Semua Status</option>
                <option value="active">Aktif</option>
                <option value="expired">Expired/Nonaktif</option>
            </select>
        </div>
    </div>

    <div style="overflow-x: auto;">
        <table style="width: 100%; border-collapse: collapse; text-align: left;">
            <thead>
                <tr style="border-bottom: 1px solid var(--admin-border);">
                    <th style="padding: 16px; color: var(--admin-text-muted); font-weight: 500;">Kode</th>
                    <th style="padding: 16px; color: var(--admin-text-muted); font-weight: 500;">Tipe & Nilai</th>
                    <th style="padding: 16px; color: var(--admin-text-muted); font-weight: 500;">Penggunaan</th>
                    <th style="padding: 16px; color: var(--admin-text-muted); font-weight: 500;">Validitas</th>
                    <th style="padding: 16px; color: var(--admin-text-muted); font-weight: 500;">Status</th>
                    <th style="padding: 16px; color: var(--admin-text-muted); font-weight: 500; text-align: right;">Aksi</th>
                </tr>
            </thead>
            <tbody id="promos-table-body">
                <!-- Injected via JS -->
            </tbody>
        </table>
    </div>
</div>

<!-- Modal Form Promo -->
<div id="promo-modal" class="admin-modal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(4px);">
    <div class="admin-card" style="width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto;">
        <h3 id="promo-modal-title" style="margin: 0 0 20px 0;">Buat Promo Baru</h3>
        <form id="promo-form">
            <div style="margin-bottom: 16px;">
                <label style="display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--admin-text-muted);">Kode Promo</label>
                <input type="text" id="promo-code" required style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid var(--admin-border); background: rgba(0,0,0,0.2); color: white;">
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px;">
                <div>
                    <label style="display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--admin-text-muted);">Tipe Diskon</label>
                    <select id="promo-type" style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid var(--admin-border); background: var(--admin-surface); color: white;">
                        <option value="percentage">Persentase (%)</option>
                        <option value="fixed">Nominal (Rp)</option>
                    </select>
                </div>
                <div>
                    <label style="display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--admin-text-muted);">Nilai Diskon</label>
                    <input type="number" id="promo-value" required min="1" style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid var(--admin-border); background: rgba(0,0,0,0.2); color: white;">
                </div>
            </div>

            <div style="margin-bottom: 16px;">
                <label style="display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--admin-text-muted);">Batas Penggunaan (Isi -1 untuk tak terbatas)</label>
                <input type="number" id="promo-limit" value="-1" required style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid var(--admin-border); background: rgba(0,0,0,0.2); color: white;">
            </div>

            <div style="margin-bottom: 16px;">
                <label style="display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--admin-text-muted);">Deskripsi</label>
                <input type="text" id="promo-desc" style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid var(--admin-border); background: rgba(0,0,0,0.2); color: white;">
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px;">
                <div>
                    <label style="display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--admin-text-muted);">Mulai Berlaku</label>
                    <input type="datetime-local" id="promo-start" required style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid var(--admin-border); background: rgba(0,0,0,0.2); color: white; color-scheme: dark;">
                </div>
                <div>
                    <label style="display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--admin-text-muted);">Berakhir Pada</label>
                    <input type="datetime-local" id="promo-end" required style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid var(--admin-border); background: rgba(0,0,0,0.2); color: white; color-scheme: dark;">
                </div>
            </div>

            <div style="margin-bottom: 24px; display: flex; align-items: center; gap: 10px;">
                <input type="checkbox" id="promo-active" checked style="width: 18px; height: 18px;">
                <label for="promo-active" style="font-size: 0.9rem;">Promo Aktif</label>
            </div>

            <div style="display: flex; justify-content: flex-end; gap: 12px;">
                <button type="button" id="btn-close-promo" class="admin-btn" style="background: transparent; border: 1px solid var(--admin-border); color: var(--admin-text-main);">Batal</button>
                <button type="submit" id="btn-save-promo" class="admin-btn"><i class="fas fa-save"></i> Simpan</button>
            </div>
        </form>
    </div>
</div>
