<div class="admin-page-header">
    <div>
        <h1 class="admin-page-title">Profil Admin</h1>
        <p class="admin-page-desc">Perbarui detail profil akun Anda dan ganti kata sandi.</p>
    </div>
</div>

<div class="admin-card">
    <div class="card-body">
        <!-- Edit Profile Form -->
        <h3 style="margin-top:0;">Informasi Akun</h3>
        <form id="form-edit-profile">
            <div class="form-group" style="margin-bottom: 15px;">
                <label class="form-label" style="display:block; margin-bottom: 5px; color: var(--admin-text-muted);">Nama Lengkap</label>
                <input type="text" id="input-name" class="form-control" style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid var(--admin-border); background: var(--admin-surface); color: var(--admin-text-main);" required>
            </div>

            <div class="form-group" style="margin-bottom: 15px;">
                <label class="form-label" style="display:block; margin-bottom: 5px; color: var(--admin-text-muted);">URL Foto Profil</label>
                <input type="url" id="input-photo" class="form-control" style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid var(--admin-border); background: var(--admin-surface); color: var(--admin-text-main);" placeholder="https://example.com/photo.jpg">
            </div>

            <div class="form-group" style="margin-bottom: 15px;">
                <label class="form-label" style="display:block; margin-bottom: 5px; color: var(--admin-text-muted);">Nomor WhatsApp</label>
                <input type="tel" id="input-whatsapp" class="form-control" style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid var(--admin-border); background: var(--admin-surface); color: var(--admin-text-main);" placeholder="08xxxxxxxxxx">
            </div>

            <button type="submit" class="admin-btn admin-btn-primary" style="padding: 10px 20px;">Simpan Profil</button>
        </form>

        <hr style="margin: 30px 0; border: none; border-top: 1px solid var(--admin-border);">

        <!-- Change Password Form -->
        <h3 style="margin-top:0;">Ubah Password</h3>
        <form id="form-change-password">
            <div class="form-group" style="margin-bottom: 15px;">
                <label class="form-label" style="display:block; margin-bottom: 5px; color: var(--admin-text-muted);">Password Lama</label>
                <div style="position: relative;">
                    <input type="password" id="input-old-password" class="form-control" style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid var(--admin-border); background: var(--admin-surface); color: var(--admin-text-main); padding-right: 40px;" required autocomplete="current-password">
                    <button type="button" class="toggle-password-btn" data-target="input-old-password" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--admin-text-muted); cursor: pointer; padding: 5px;">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="form-group" style="margin-bottom: 15px;">
                <label class="form-label" style="display:block; margin-bottom: 5px; color: var(--admin-text-muted);">Password Baru</label>
                <div style="position: relative;">
                    <input type="password" id="input-new-password" class="form-control" style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid var(--admin-border); background: var(--admin-surface); color: var(--admin-text-main); padding-right: 40px;" required autocomplete="new-password">
                    <button type="button" class="toggle-password-btn" data-target="input-new-password" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--admin-text-muted); cursor: pointer; padding: 5px;">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                
                <div class="password-strength" id="admin-password-strength" style="display: none; margin-top: 8px;">
                  <div class="strength-meter" style="width: 100%; height: 4px; background: rgba(255, 255, 255, 0.1); border-radius: 2px; margin-bottom: 5px; overflow: hidden;">
                    <div class="strength-bar" id="admin-strength-bar" style="height: 100%; width: 0%; transition: all 0.3s; border-radius: 2px;"></div>
                  </div>
                  <div class="strength-text" id="admin-strength-text" style="font-size: 11px; color: var(--admin-text-muted);"></div>
                </div>
                
                <small style="color: var(--admin-text-muted); font-size: 0.8rem; display: block; margin-top: 5px;">Minimal 8 karakter</small>
            </div>

            <div class="form-group" style="margin-bottom: 20px;">
                <label class="form-label" style="display:block; margin-bottom: 5px; color: var(--admin-text-muted);">Konfirmasi Password</label>
                <div style="position: relative;">
                    <input type="password" id="input-confirm-password" class="form-control" style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid var(--admin-border); background: var(--admin-surface); color: var(--admin-text-main); padding-right: 40px;" required autocomplete="new-password">
                    <button type="button" class="toggle-password-btn" data-target="input-confirm-password" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--admin-text-muted); cursor: pointer; padding: 5px;">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="admin-btn admin-btn-primary" style="padding: 10px 20px;">Ubah Password</button>
        </form>
    </div>
</div>
