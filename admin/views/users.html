<div class="admin-page-header">
    <div>
        <h1 class="admin-page-title">Manajemen Users</h1>
        <p class="admin-page-desc">Kelola akun pelanggan dan akses admin.</p>
    </div>
    <div>
        <button class="admin-btn" id="btn-add-user">
            <i class="fas fa-plus"></i> Tambah User
        </button>
    </div>
</div>

<div class="admin-card">
    <!-- Toolbar -->
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
        <div style="position: relative; width: 300px;">
            <i class="fas fa-search" style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--admin-text-muted);"></i>
            <input type="text" id="search-users" placeholder="Cari nama atau email..." 
                style="width: 100%; padding: 12px 16px 12px 48px; border-radius: 8px; border: 1px solid var(--admin-border); background: rgba(0,0,0,0.2); color: var(--admin-text-main); font-family: var(--font-admin-body);">
        </div>
        
        <div style="display: flex; gap: 12px;">
            <select style="padding: 12px 16px; border-radius: 8px; border: 1px solid var(--admin-border); background: var(--admin-surface); color: var(--admin-text-main); font-family: var(--font-admin-body);">
                <option value="all">Semua Status</option>
                <option value="active">Aktif</option>
                <option value="suspended">Suspended</option>
            </select>
            <button class="admin-btn" style="background: var(--admin-surface-hover); color: var(--admin-text-main);">
                <i class="fas fa-filter"></i> Filter
            </button>
        </div>
    </div>

    <!-- Table -->
    <div style="overflow-x: auto;">
        <table style="width: 100%; border-collapse: collapse; text-align: left;">
            <thead>
                <tr style="border-bottom: 1px solid var(--admin-border);">
                    <th style="padding: 16px; color: var(--admin-text-muted); font-weight: 500;">User Info</th>
                    <th style="padding: 16px; color: var(--admin-text-muted); font-weight: 500;">Role</th>
                    <th style="padding: 16px; color: var(--admin-text-muted); font-weight: 500;">Status</th>
                    <th style="padding: 16px; color: var(--admin-text-muted); font-weight: 500;">Bergabung</th>
                    <th style="padding: 16px; color: var(--admin-text-muted); font-weight: 500; text-align: right;">Aksi</th>
                </tr>
            </thead>
            <tbody id="users-table-body">
                <!-- Data will be injected here via JS -->
            </tbody>
        </table>
    </div>
    
    <!-- Pagination -->
    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--admin-border);">
        <p style="color: var(--admin-text-muted); margin: 0; font-size: 0.9rem;">Menampilkan 1-5 dari 1,248 user</p>
        <div style="display: flex; gap: 8px;">
            <button class="admin-btn" style="background: var(--admin-surface-hover); color: var(--admin-text-muted); padding: 8px 16px;" disabled>
                <i class="fas fa-chevron-left"></i>
            </button>
            <button class="admin-btn" style="background: var(--admin-primary); color: white; padding: 8px 16px;">1</button>
            <button class="admin-btn" style="background: var(--admin-surface-hover); color: var(--admin-text-main); padding: 8px 16px;">2</button>
            <button class="admin-btn" style="background: var(--admin-surface-hover); color: var(--admin-text-main); padding: 8px 16px;">3</button>
            <button class="admin-btn" style="background: var(--admin-surface-hover); color: var(--admin-text-main); padding: 8px 16px;">
                <i class="fas fa-chevron-right"></i>
            </button>
        </div>
    </div>
</div>

<!-- Modal Form User -->
<div id="user-modal" class="admin-modal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(4px);">
    <div class="admin-card" style="width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto;">
        <h3 id="user-modal-title" style="margin: 0 0 20px 0;">Tambah User Baru</h3>
        <form id="user-form">
            <input type="hidden" id="usr-id">
            
            <div style="margin-bottom: 16px;">
                <label style="display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--admin-text-muted);">Nama Lengkap</label>
                <input type="text" id="usr-name" required style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid var(--admin-border); background: rgba(0,0,0,0.2); color: white;">
            </div>
            
            <div style="margin-bottom: 16px;">
                <label style="display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--admin-text-muted);">Email</label>
                <input type="email" id="usr-email" required style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid var(--admin-border); background: rgba(0,0,0,0.2); color: white;">
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px;">
                <div>
                    <label style="display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--admin-text-muted);">WhatsApp</label>
                    <input type="text" id="usr-wa" style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid var(--admin-border); background: rgba(0,0,0,0.2); color: white;">
                </div>
                <div>
                    <label style="display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--admin-text-muted);">Role</label>
                    <select id="usr-role" style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid var(--admin-border); background: var(--admin-surface); color: white;">
                        <option value="customer">Customer</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
            </div>

            <div style="margin-bottom: 16px;">
                <label style="display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--admin-text-muted);">Password (Kosongkan jika tidak ingin diubah)</label>
                <input type="password" id="usr-password" style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid var(--admin-border); background: rgba(0,0,0,0.2); color: white;">
            </div>
            
            <div style="display: flex; gap: 20px; margin-bottom: 24px;">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <input type="checkbox" id="usr-active" checked style="width: 18px; height: 18px;">
                    <label for="usr-active" style="font-size: 0.9rem;">Akun Aktif</label>
                </div>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <input type="checkbox" id="usr-verified" checked style="width: 18px; height: 18px;">
                    <label for="usr-verified" style="font-size: 0.9rem;">Email Verified</label>
                </div>
            </div>

            <div style="display: flex; justify-content: flex-end; gap: 12px;">
                <button type="button" id="btn-close-user" class="admin-btn" style="background: transparent; border: 1px solid var(--admin-border); color: var(--admin-text-main);">Batal</button>
                <button type="submit" id="btn-save-user" class="admin-btn"><i class="fas fa-save"></i> Simpan</button>
            </div>
        </form>
    </div>
</div>
