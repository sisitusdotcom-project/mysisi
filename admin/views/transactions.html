<div class="admin-page-header">
    <div>
        <h1 class="admin-page-title">Transaksi & Tagihan</h1>
        <p class="admin-page-desc">Pantau semua pembayaran masuk dari pelanggan.</p>
    </div>
    <div style="display: flex; gap: 12px;">
        <button class="admin-btn" style="background: var(--admin-surface-hover); color: var(--admin-text-main);">
            <i class="fas fa-file-export"></i> Export CSV
        </button>
        <button class="admin-btn" id="btn-add-tx">
            <i class="fas fa-file-invoice"></i> Buat Invoice Manual
        </button>
    </div>
</div>

<div class="admin-metrics-grid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-bottom: 24px;">
    <div class="admin-card" style="padding: 16px 24px;">
        <p style="color: var(--admin-text-muted); margin: 0 0 4px 0; font-size: 0.9rem;">Total Pendapatan</p>
        <h3 style="margin: 0; font-size: 1.5rem; font-weight: 700; color: var(--admin-text-main);">Rp 45.500.000</h3>
    </div>
    <div class="admin-card" style="padding: 16px 24px;">
        <p style="color: var(--admin-text-muted); margin: 0 0 4px 0; font-size: 0.9rem;">Menunggu Pembayaran</p>
        <h3 style="margin: 0; font-size: 1.5rem; font-weight: 700; color: var(--admin-warning);">Rp 3.250.000</h3>
    </div>
    <div class="admin-card" style="padding: 16px 24px;">
        <p style="color: var(--admin-text-muted); margin: 0 0 4px 0; font-size: 0.9rem;">Transaksi Sukses (Bulan ini)</p>
        <h3 style="margin: 0; font-size: 1.5rem; font-weight: 700; color: var(--admin-success);">142</h3>
    </div>
</div>

<div class="admin-card">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
        <div style="position: relative; width: 300px;">
            <i class="fas fa-search" style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--admin-text-muted);"></i>
            <input type="text" id="search-tx" placeholder="Cari No Invoice / Email..." 
                style="width: 100%; padding: 12px 16px 12px 48px; border-radius: 8px; border: 1px solid var(--admin-border); background: rgba(0,0,0,0.2); color: var(--admin-text-main); font-family: var(--font-admin-body);">
        </div>
        
        <div style="display: flex; gap: 12px;">
            <select style="padding: 12px 16px; border-radius: 8px; border: 1px solid var(--admin-border); background: var(--admin-surface); color: var(--admin-text-main); font-family: var(--font-admin-body);">
                <option value="all">Semua Status</option>
                <option value="paid">Lunas (Paid)</option>
                <option value="unpaid">Menunggu (Unpaid)</option>
                <option value="failed">Gagal (Failed)</option>
            </select>
        </div>
    </div>

    <div style="overflow-x: auto;">
        <table style="width: 100%; border-collapse: collapse; text-align: left;">
            <thead>
                <tr style="border-bottom: 1px solid var(--admin-border);">
                    <th style="padding: 16px; color: var(--admin-text-muted); font-weight: 500;">Invoice</th>
                    <th style="padding: 16px; color: var(--admin-text-muted); font-weight: 500;">Pelanggan</th>
                    <th style="padding: 16px; color: var(--admin-text-muted); font-weight: 500;">Item</th>
                    <th style="padding: 16px; color: var(--admin-text-muted); font-weight: 500;">Total</th>
                    <th style="padding: 16px; color: var(--admin-text-muted); font-weight: 500;">Status</th>
                    <th style="padding: 16px; color: var(--admin-text-muted); font-weight: 500; text-align: right;">Aksi</th>
                </tr>
            </thead>
            <tbody id="tx-table-body">
                <!-- Data will be injected here via JS -->
            </tbody>
        </table>
    </div>
</div>

<!-- Modal Form Transaction -->
<div id="tx-modal" class="admin-modal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(4px);">
    <div class="admin-card" style="width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto;">
        <h3 id="tx-modal-title" style="margin: 0 0 20px 0;">Buat Invoice Manual</h3>
        <form id="tx-form">
            <input type="hidden" id="tx-inv">
            
            <div style="margin-bottom: 16px;">
                <label style="display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--admin-text-muted);">Nama Pelanggan</label>
                <input type="text" id="tx-name" required style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid var(--admin-border); background: rgba(0,0,0,0.2); color: white;">
            </div>
            
            <div style="margin-bottom: 16px;">
                <label style="display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--admin-text-muted);">Email Pelanggan</label>
                <input type="email" id="tx-email" required style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid var(--admin-border); background: rgba(0,0,0,0.2); color: white;">
            </div>
            
            <div style="margin-bottom: 16px;">
                <label style="display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--admin-text-muted);">Nama Item / Paket</label>
                <input type="text" id="tx-item" required style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid var(--admin-border); background: rgba(0,0,0,0.2); color: white;">
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px;">
                <div>
                    <label style="display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--admin-text-muted);">Domain (Opsional)</label>
                    <input type="text" id="tx-domain" style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid var(--admin-border); background: rgba(0,0,0,0.2); color: white;">
                </div>
                <div>
                    <label style="display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--admin-text-muted);">Total Tagihan (Rp)</label>
                    <input type="number" id="tx-total" required min="0" style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid var(--admin-border); background: rgba(0,0,0,0.2); color: white;">
                </div>
            </div>
            
            <div style="margin-bottom: 24px;">
                <label style="display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--admin-text-muted);">Status Pembayaran</label>
                <select id="tx-status" style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid var(--admin-border); background: var(--admin-surface); color: white;">
                    <option value="unpaid">Menunggu (Unpaid)</option>
                    <option value="paid">Lunas (Paid)</option>
                    <option value="failed">Gagal / Dibatalkan (Failed)</option>
                </select>
            </div>

            <div style="display: flex; justify-content: flex-end; gap: 12px;">
                <button type="button" id="btn-close-tx" class="admin-btn" style="background: transparent; border: 1px solid var(--admin-border); color: var(--admin-text-main);">Batal</button>
                <button type="submit" id="btn-save-tx" class="admin-btn"><i class="fas fa-save"></i> Simpan</button>
            </div>
        </form>
    </div>
</div>
