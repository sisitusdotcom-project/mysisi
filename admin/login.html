<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - SISITUS</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/assets/favicon/favicon.ico">
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Admin Base Styles -->
    <link rel="stylesheet" href="/admin/styles/admin-main.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #0f111a;
            font-family: var(--font-admin-body);
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--admin-border);
            border-radius: 24px;
            backdrop-filter: blur(16px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .admin-logo {
            font-family: var(--font-admin-heading);
            font-size: 2rem;
            font-weight: 700;
            color: var(--admin-text-main);
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .admin-logo span {
            color: var(--admin-primary);
        }

        .login-subtitle {
            color: var(--admin-text-muted);
            margin-bottom: 32px;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            color: var(--admin-text-muted);
            font-size: 0.85rem;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--admin-border);
            border-radius: 8px;
            color: var(--admin-text-main);
            font-family: var(--font-admin-body);
            transition: all 0.2s;
            box-sizing: border-box;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--admin-primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: var(--admin-primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-family: var(--font-admin-body);
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 12px;
        }

        .login-btn:hover {
            background: var(--admin-primary-hover);
        }

        .login-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .error-message {
            color: var(--admin-danger);
            background: rgba(239, 68, 68, 0.1);
            padding: 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="admin-logo">SISI<span>TUS</span></div>
        <p class="login-subtitle">Admin Control Panel</p>

        <div id="error-box" class="error-message"></div>

        <form id="admin-login-form">
            <div class="form-group">
                <label class="form-label">Email Admin</label>
                <input type="email" id="email" class="form-input" required placeholder="admin@sisitus.com">
            </div>
            
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" id="password" class="form-input" required placeholder="••••••••">
            </div>

            <button type="submit" id="submit-btn" class="login-btn">
                Masuk ke Dashboard
            </button>
        </form>
        
        <p style="margin-top: 24px; font-size: 0.8rem; color: var(--admin-text-muted);">
            <a href="/" style="color: var(--admin-text-muted); text-decoration: none;"><i class="fas fa-arrow-left"></i> Kembali ke Website</a>
        </p>
    </div>

    <!-- Scripts -->
    <script type="module" src="/admin/js/admin-login.js"></script>
</body>
</html>
