<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Verifikasi Email - SISITUS">
  <title>Verifikasi Email - SISITUS</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="icon" href="/assets/favicon/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/components/auth.css">
  <!-- SweetAlert2 for Elegant Notifications -->
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.js"></script>
</head>
<body class="auth-page-body">

  <div class="auth-split-wrapper">
    <!-- Left Visual Panel (Desktop only) -->
    <div class="auth-visual-panel">
      <a href="/" class="back-home-link-visual">
        <i class="fas fa-arrow-left"></i> Kembali ke Beranda
      </a>
      
      <div class="auth-visual-content">
        <img src="/assets/img/logo/logo.svg" alt="SISITUS Logo" class="auth-visual-logo">
        <h1 class="auth-visual-title">Verifikasi Akun SISITUS</h1>
        <p class="auth-visual-subtitle">Langkah terakhir untuk mengamankan akun Anda dan mulai mengelola domain & hosting terbaik.</p>
        
        <div class="auth-features-list">
          <div class="auth-feature-item">
            <i class="fas fa-shield-alt"></i>
            <span>Verifikasi email otomatis aman.</span>
          </div>
          <div class="auth-feature-item">
            <i class="fas fa-check-circle"></i>
            <span>Akses langsung ke seluruh dashboard.</span>
          </div>
        </div>
      </div>
      
      <div class="auth-visual-footer">
        &copy; 2026 SISITUS. All rights reserved.
      </div>
    </div>

    <!-- Right Form Panel -->
    <div class="auth-form-panel">
      <!-- Back link -->
      <a href="/" class="back-home-link-form">
        <i class="fas fa-arrow-left"></i> Kembali ke Beranda
      </a>

      <!-- Mobile brand logo (visible on mobile only) -->
      <div class="auth-mobile-logo">
        <img src="/assets/img/logo/logo.svg" alt="SISITUS Logo">
        <span>SISITUS</span>
      </div>

      <div class="auth-panel-content">
        <div id="status-content">
          <!-- Content will be inserted here by JavaScript -->
        </div>
      </div>
    </div>
  </div>

  <style>
    .status-icon {
      font-size: 3rem;
      margin-bottom: 1.5rem;
    }
    .spinner {
      display: inline-block;
      height: 40px;
      width: 40px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid var(--auth-primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .success-message {
      color: #059669;
    }
    .error-message {
      color: #dc2626;
    }
    .info-box {
      background: #f8fafc;
      border-left: 4px solid var(--auth-primary);
      padding: 15px;
      margin: 20px 0;
      text-align: left;
      border-radius: 6px;
      font-size: 13px;
      border: 1px solid #e2e8f0;
      border-left-width: 4px;
    }
    .info-box strong {
      color: var(--auth-primary);
    }
    .button-group {
      margin-top: 25px;
      display: flex;
      gap: 10px;
      flex-direction: column;
    }
    .button-group a {
      width: 100%;
      text-align: center;
    }
  </style>

  <script type="module">
    import { GAS_CONFIG } from '/assets/js/config/api.config.js';
    
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    const statusContent = document.getElementById('status-content');
    const TIMEOUT = 30000; // 30 second timeout

    if (!token) {
      // Check if this is first visit (no token)
      const referrer = document.referrer;
      const fromRegistration = referrer.includes('/auth') || referrer.includes('register');
      
      if (fromRegistration) {
        showInfo(
          '📧 Cek Email Anda!',
          'Link verifikasi telah dikirim ke email Anda. Silakan buka email dan klik link verifikasi untuk mengaktifkan akun Anda.'
        );
      } else {
        showError(
          'Token Tidak Ditemukan',
          'Silakan gunakan link verifikasi email yang lengkap dari email Anda. Link harus berformat: https://mysisi.pages.dev/auth/verify-email.html?token=xxxxx'
        );
      }
    } else {
      showLoading('Memverifikasi Email...', 'Mohon tunggu sebentar');
      verifyEmailToken(token);
    }

    function showInfo(title, message) {
      statusContent.innerHTML = `
        <div class="status-icon" style="color: var(--auth-primary);">
          <i class="fas fa-envelope-open-text"></i>
        </div>
        <h2 style="color: var(--auth-primary); font-size: 1.5rem; font-weight: 800; margin-bottom: 10px;">${title}</h2>
        <p style="color: var(--auth-text-light); font-size: 0.95rem; line-height: 1.5;">${message}</p>
        <div class="info-box">
          <strong><i class="fas fa-lightbulb"></i> Tips:</strong><br>
          Jika email tidak terlihat, cek folder:
          <ul style="margin-top: 8px; text-align: left; list-style: inside; padding-left: 5px;">
            <li><strong>Spam/Junk</strong> - Pindahkan ke Inbox</li>
            <li><strong>Promotions/Tab lain</strong> - Cek semua tab</li>
          </ul>
        </div>
        <div class="button-group">
          <a href="/auth/" class="btn btn-secondary"><i class="fas fa-sign-in-alt"></i> Kembali ke Login</a>
          <a href="/" class="btn btn-secondary"><i class="fas fa-home"></i> Kembali ke Beranda</a>
        </div>
      `;
    }

    function showLoading(title, message) {
      statusContent.innerHTML = `
        <h2 style="font-size: 1.5rem; font-weight: 800; margin-bottom: 10px; color: var(--auth-text-dark);">${title}</h2>
        <p style="color: var(--auth-text-light); font-size: 0.95rem;">${message}</p>
        <div style="margin: 30px 0;">
          <div class="spinner"></div>
        </div>
        <p style="color: var(--auth-text-light); font-size: 12px;">
          <i class="fas fa-info-circle"></i> Sistem sedang memverifikasi email Anda. Mohon tunggu...
        </p>
      `;
    }

    function showSuccess(title, message) {
      const cartSummary = JSON.parse(localStorage.getItem('cart') || '{"domains":[]}');
      const hasCartItems = cartSummary.domains && cartSummary.domains.length > 0;
      
      const primaryBtn = hasCartItems 
        ? '<a href="/cart/" class="btn btn-primary"><i class="fas fa-shopping-cart"></i> Lanjutkan Pembayaran</a>'
        : '<a href="/dashboard/" class="btn btn-primary"><i class="fas fa-chart-line"></i> Buka Dashboard</a>';
        
      const redirectMsg = hasCartItems
        ? 'Halaman akan otomatis diarahkan ke keranjang belanja dalam 2 detik...'
        : 'Halaman akan otomatis diarahkan ke dashboard dalam 2 detik...';

      statusContent.innerHTML = `
        <div class="status-icon success-message"><i class="fas fa-check-circle"></i></div>
        <h2 class="success-message" style="font-size: 1.5rem; font-weight: 800; margin-bottom: 10px;">${title}</h2>
        <p style="color: var(--auth-text-light); font-size: 0.95rem; line-height: 1.5;">${message}</p>
        <div class="info-box">
          <strong><i class="fas fa-info-circle"></i> Anda sekarang dapat:</strong><br>
          ${hasCartItems 
            ? '✅ Lanjutkan checkout di keranjang belanja<br>✅ Melakukan pembayaran via Midtrans<br>' 
            : '✅ Mengakses dashboard klien Anda<br>✅ Mengelola layanan digital Anda<br>'}
        </div>
        <div class="button-group">
          ${primaryBtn}
          <a href="/" class="btn btn-secondary"><i class="fas fa-home"></i> Kembali ke Beranda</a>
        </div>
        <p style="color: var(--auth-text-light); font-size: 11px; margin-top: 20px;">${redirectMsg}</p>
      `;
    }

    function showError(title, message) {
      statusContent.innerHTML = `
        <div class="status-icon error-message"><i class="fas fa-times-circle"></i></div>
        <h2 class="error-message" style="font-size: 1.5rem; font-weight: 800; margin-bottom: 10px;">${title}</h2>
        <p style="color: var(--auth-text-light); font-size: 0.95rem; line-height: 1.5;">${message}</p>
        <div class="info-box">
          <strong><i class="fas fa-lightbulb"></i> Solusi:</strong><br>
          Cek email Anda kembali dan gunakan link verifikasi terbaru. Jika sudah tidak dapat ditemukan, silakan daftar ulang.
        </div>
        <div class="button-group">
          <a href="/checkout" class="btn btn-primary"><i class="fas fa-user-plus"></i> Daftar Ulang</a>
          <a href="/" class="btn btn-secondary"><i class="fas fa-home"></i> Kembali ke Beranda</a>
        </div>
      `;
    }

    async function verifyEmailToken(token) {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), TIMEOUT);

      try {
        const params = new URLSearchParams({
          action: 'verifyEmailToken',
          token: token
        });

        const apiUrl = `${GAS_CONFIG.URL}?${params}`;

        const response = await fetch(apiUrl, {
          signal: controller.signal
        });

        if (!response.ok) {
          throw new Error(`HTTP Error: ${response.status}`);
        }

        const data = await response.json();

        if (data.success) {
          // CRITICAL: Save updated user data using AuthManager key
          if (data.data && data.data.userId) {
            // Save to both localStorage (for cross-tab) and sessionStorage (for current tab)
            const userData = JSON.stringify({
              version: 2,
              user: data.data,
              isLoggedIn: true,
              lastActivity: Date.now(),
              expiresAt: Date.now() + (30 * 60 * 1000) // 30 min expiry
            });
            localStorage.setItem('sisitus_user', userData);
            sessionStorage.setItem('sisitus_user', userData);
            localStorage.setItem('currentUser', JSON.stringify(data.data));
            console.log('✅ User session updated with emailVerified:', data.data);
          }

          const cartSummary = JSON.parse(localStorage.getItem('cart') || '{"domains":[]}');
          const hasCartItems = cartSummary.domains && cartSummary.domains.length > 0;

          showSuccess(
            'Email Berhasil Diverifikasi!',
            hasCartItems 
              ? 'Akun Anda sudah aktif. Anda akan diarahkan kembali ke keranjang belanja...'
              : 'Akun Anda sudah aktif. Anda akan diarahkan ke dashboard Anda...'
          );
          
          // Auto-redirect after 2 seconds
          setTimeout(() => {
            if (hasCartItems) {
              window.location.href = '/cart/';
            } else {
              window.location.href = '/dashboard/';
            }
          }, 2000);
        } else {
          showError(
            'Verifikasi Gagal',
            data.message || 'Token verifikasi tidak valid atau sudah kadaluarsa. Link verifikasi berlaku 24 jam.'
          );
        }
      } catch (error) {
        let errorTitle = 'Terjadi Kesalahan';
        let errorMsg = 'Tidak dapat terhubung ke server. Silakan coba lagi nanti.';
        
        if (error.name === 'AbortError') {
          errorMsg = 'Permintaan timeout (lebih dari 30 detik). Server tidak merespons. Silakan: <br>1. Refresh halaman<br>2. Atau coba lagi dalam beberapa menit';
        } else if (error instanceof TypeError) {
          errorMsg = 'Kesalahan jaringan. Periksa koneksi internet Anda dan coba lagi. Jika masalah berlanjut, hubungi support.';
        }
        
        showError(errorTitle, errorMsg);
      } finally {
        clearTimeout(timeoutId);
      }
    }
  </script>
</body>
</html>
