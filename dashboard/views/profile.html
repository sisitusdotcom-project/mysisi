<div class="dashboard-page-header" style="background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);">
  <div class="dashboard-page-header-content">
    <h1 class="dashboard-page-header-title">Profil Saya</h1>
    <p class="dashboard-page-header-desc">Perbarui detail profil akun Anda, ganti kata sandi, serta lengkapi data kontak WhatsApp untuk pemberitahuan tagihan.</p>
  </div>
  <div class="dashboard-page-header-visual">
    <i class="fas fa-user-cog"></i>
  </div>
</div>

<div class="card" style="border-top: none;">
  <div class="card-body">
    <!-- Edit Profile Form -->
    <h3>Informasi Akun</h3>
    <form id="form-edit-profile">
      <div class="form-group">
        <label class="form-label">Nama Lengkap</label>
        <input type="text" id="input-name" class="form-control" required>
      </div>

      <div class="form-group">
        <label class="form-label">URL Foto Profil</label>
        <input type="url" id="input-photo" class="form-control" placeholder="https://example.com/photo.jpg">
      </div>

      <div class="form-group">
        <label class="form-label">Nomor WhatsApp</label>
        <input type="tel" id="input-whatsapp" class="form-control" placeholder="08xxxxxxxxxx">
      </div>

      <button type="submit" class="btn btn-primary">Simpan Profil</button>
    </form>

    <hr style="margin: 30px 0;">

    <!-- Change Password Form -->
    <h3>Ubah Password</h3>
    <form id="form-change-password">
      <div class="form-group">
        <label class="form-label">Password Lama</label>
        <input type="password" id="input-old-password" class="form-control" required>
      </div>

      <div class="form-group">
        <label class="form-label">Password Baru</label>
        <input type="password" id="input-new-password" class="form-control" required autocomplete="new-password">
        
        <div class="password-strength" id="user-password-strength" style="display: none; margin-top: 8px;">
          <div class="strength-meter" style="width: 100%; height: 4px; background: #eee; border-radius: 2px; margin-bottom: 5px; overflow: hidden;">
            <div class="strength-bar" id="user-strength-bar" style="height: 100%; width: 0%; transition: all 0.3s; border-radius: 2px;"></div>
          </div>
          <div class="strength-text" id="user-strength-text" style="font-size: 11px; color: #94a3b8;"></div>
        </div>
        
        <small>Minimal 8 karakter</small>
      </div>

      <div class="form-group">
        <label class="form-label">Konfirmasi Password</label>
        <input type="password" id="input-confirm-password" class="form-control" required>
      </div>

      <button type="submit" class="btn btn-primary">Ubah Password</button>
    </form>
  </div>
</div>
